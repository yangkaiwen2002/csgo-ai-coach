# CS:GO AI Coach — Model Configuration

# Model architecture
feature_dim: 23
d_model: 128
nhead: 4
num_layers: 3
dropout: 0.1

# Training
epochs: 50
batch_size: 64
seq_len: 32
lr: 0.001
weight_decay: 0.0001

# Data
map_name: de_dust2
perspective: CT   # CT or T
sample_every_n_ticks: 8

# Checkpointing
checkpoint_dir: checkpoints/
best_model_path: checkpoints/best_model.pt
